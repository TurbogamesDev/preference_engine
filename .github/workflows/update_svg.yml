name: Anime Preference Prediction SVG Updator

on:
  workflow_dispatch:
  repository_dispatch:
    types: [external-cron-trigger]

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Gives the action permission to push code updates

    steps:
    # Step 1: Download your repository code into the runner machine
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Boot up Python on the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    # Step 3: Install any external packages (like tabulate or requests if you use them)
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Execute your Python code to rewrite preference_card.svg
    - name: Run Card Generator Script
      run: python main.py

    # Step 5: Check if the SVG file changed, and commit it back to the repo automatically
    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add output.svg
        git add log_file.txt
        # Only commit if changes were actually made to prevent empty build errors
        git commit -m "Anime Preference Prediction SVG Update [skip ci]"
        git push || echo "No changes to push"